<ng-container *transloco="let t; read: 'display_confidence'">
  @let label = t(display.i18nKey);
  <div class="confidence {{ display.color }}">
    <mat-icon [class.material-icons-outlined]="display.outlined" [matTooltip]="showText ? '' : label">
      {{ display.icon }}
    </mat-icon>
    {{ showText ? label : "" }}
  </div>
</ng-container>
