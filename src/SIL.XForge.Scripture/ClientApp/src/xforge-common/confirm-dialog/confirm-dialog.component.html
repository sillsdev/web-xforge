<ng-container *transloco="let t; read: 'confirm_dialog'">
  <mdc-dialog>
    <mdc-dialog-container>
      <mdc-dialog-surface>
        <mdc-dialog-title>{{ title }}</mdc-dialog-title>
        <mdc-dialog-content *ngIf="message">{{ message }}</mdc-dialog-content>
        <mdc-dialog-actions>
          <button mdcDialogButton type="button" mdcDialogAction="close">{{ cancelButtonText }}</button>
          <button mdcDialogButton [default]="true" type="button" mdcDialogAction="confirmed">
            {{ confirmButtonText }}
          </button>
        </mdc-dialog-actions>
      </mdc-dialog-surface>
    </mdc-dialog-container>
  </mdc-dialog>
</ng-container>
