        - token:
          - orgs.roles
          - orgs.roles:write
      parameters:
        - in: body
          name: role
          schema:
            type: string
            description: Role identifier
      responses:
        204:
          description: Successfully assigned role
        404:
          description: |
            The requested organisation or user does not exist or the
            authenticated user is not authorised to view it.

  /orgs/{org-id}/roles/{user-id}/{role}:
    parameters:
      - $ref: '#/parameters/org-id'
      - $ref: '#/parameters/user-id'
      - in: path
        name: role
        type: string
        description: Role identifier
        required: true
    delete:
      tags:
        - Organisations
      summary: Remove role from user in organisation
      description: |
        This call removes the given role from the user in the organisation.
      security2:
        - token:
          - orgs.roles
          - orgs.roles:write
      responses:
        204:
          description: Successfully removed role
        404:
          description: |
            The requested organisation or user does not exist or the
            authenticated user is not authorised to view it.

  /users:
    get:
      tags:
        - Users
      summary: List users
      parameters:
        - name: username
          in: query
          type: string
          description: |
            Limit result set to users with a given username.
        - name: emails.address
          in: query
          type: string
          description: |
            Limit result set to users with a given e-mail address.
      security2:
        - token:
          - users:read
      responses:
        200:
          description: Returns an array of objects containing user data
        304:
          $ref: '#/responses/304'
    post:
      tags:
        - Users
      summary: Register a user
      security2:
        - token:
          - users:create
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required:
              - username
              - orgId
              - profile
            properties:
              username:
                type: string
                description: The username of the new user to register.
                example: "John Doe"
              orgId:
                type: string
                description: The organisation to create the user in.
                example: 5494956f5117ad586f2e2f40
              profile:
                type: object
                properties:
                  firstName:
                    type: string
                    description: The user's first name.
                    example: "John"
                  lastName:
                    type: string
                    description: The user's last name.
                    example: "Doe"
      responses:
        200:
          description: Returns an array of objects containing user data
        409:
          description: This username already exists on the server.

  /users/{user-id}/username:
    parameters:
      - $ref: '#/parameters/user-id'
    get:
      tags:
        - Users
      summary: Get a user's registration name
      security2:
        - basic: []
        - token: []
      responses:
        200:
          description: Returns a string with the user's registration name
          schema:
            type: string
        404:
          description: |
            The requested user does not exist or the authenticated user is not
            authorised to view it.

  /users/{user-id}/org:
    parameters:
      - $ref: '#/parameters/user-id'
    get:
      tags:
        - Users
      summary: Get a user's primary organisation
      security2:
        - token:
          - users.org:read
      responses:
        200:
          description: Returns null or an org object.
          schema:
            $ref: '#/definitions/OrgMetadata'
        404:
          description: |
            The requested user does not exist or the authenticated user is not
            authorised to view it.

  /users/{user-id}/projects:
    parameters:
      - $ref: '#/parameters/user-id'
    get:
      tags:
        - Users
      summary: Get metadata of a user's projects
      parameters:
        - name: active
          in: query
          type: boolean
          description: |
            If set to true, restricts output to only projects with active
            licenses.  If set to false, only to projects of which the license
            has expired or been revoked.  If omitted, includes all projects.
      security2:
        - basic: []
        - token: []
      responses:
        200:
          description: Returns a list of project metadata objects
          schema:
            type: array
            items:
              $ref: '#/definitions/ProjectMetadata'
        304:
          $ref: '#/responses/304'
        404:
          description: |
            The requested user does not exist or the authenticated user is not
            authorised to view it.

  /users/{user-id}/licenses:
    parameters:
      - $ref: '#/parameters/user-id'
    get:
      tags:
        - Users
      summary: Get licenses of a user's projects
      parameters:
        - name: active
          in: query
          type: boolean
          description: |
            If set to true, restricts output to only projects with active
            licenses.  If set to false, only to projects of which the license
            has expired or been revoked.  If omitted, includes all projects.
      security2:
        - basic: []
        - token: []
      responses:
        200:
          description: Returns a list of project registration objects
          schema:
            type: array
            items:
              $ref: '#/definitions/ProjectRegistration'
        304:
          $ref: '#/responses/304'
        404:
          description: |
            The requested user does not exist or the authenticated user is not
            authorised to view it.
  /users/{userId}/roles:
    parameters:
      - $ref: '#/parameters/user-id'
    get:
      tags:
        - Users
      summary: Get user's roles
      description: |
        This endpoint returns a list of all a user's roles across all organizations.
      responses:
        200:
          description: Returns a list of role objects
          schema:
            type: array
            items:
              ref: '#definitions/UserRole'
              
        404:
          description: |
            The requested user does not exist or the authenticated user is not
            authorised to view it.
    post:
      tags:
        - Users
      summary: Add role to user in organisation
      description: |
        This call assigns the given role to the user in the given organisation.
      security2:
        - token:
          - users.roles
      parameters:
        - in: body
          name: role
          schema:
            type: string
            description: Role identifier
      responses:
        204:
          description: Successfully assigned role
        404:
          description: |
            The requested organisation or user does not exist or the
            authenticated user is not authorised to view it.


definitions:
  SystemId:
    type: object
    required: ["type", "text"]
    properties:
      type:
        type: string
        enum: ["dbl", "tms", "paratext", "biblica"]
        example: paratext
      name:
        type: string
      fullname:
        type: string
      text:
        type: string
        description: System identifier
        pattern: /^[-0-9a-f]{16,40}$/
        example: 4a5464f729ae3603078842b4517454f70610ffa8

  OrgId:
    type: object
    required: ["id"]
    properties:
      id:
        type: string
        description: Unique organisation identifier consisting of 24 alphanumeric characters
        format: org-id
        pattern: /^[0-9a-f]{24}$/
        example: 5494956f5117ad586f2e2f40

  Contributor:
    type: object
    required: ["id"]
    properties:
      id:
        type: string
        format: org-id
        description: Unique organisation identifier consisting of 24 alphanumeric characters
        pattern: /^[0-9a-f]{24}$/
        example: 5494956f5117ad586f2e2f40
      content:
        type: boolean
      publication:
        type: boolean
      management:
        type: boolean
      qa:
        type: boolean
      finance:
        type: boolean

  ProjectMetadata:
    type: object
    required:
      - identification_name
      - agencies_rightsHolders
      - language_iso
      - countries
      - identification_abbreviation
      - type_translationType
    properties:
      _id:
        type: string
        description: Registry Identifier
        example: "Zf8nG95bsEQQ78Bce"

      # Fields from here  to <END GBC FIELDS> are shared between the Registry
      # and GBC.  They MUST NOT have their definitions changed here unless the
      # same change is made in GBC.
      identification_systemId:
        type: array
        description: System identifiers
        items:
          $ref: '#/definitions/SystemId'
        default: []
        example:
        - type: paratext
          id: dbb4aeddf353585b42792940575442a70c09885b
          name: ShortName

      identification_name:
        type: string
        description: Full Name
        minLength: 1

      # MUST be equal to "name" field in identification_systemId[type="paratext"]
      identification_shortName:
        type: string
        description: Paratext Name
        example: ShortName

      identification_description:
        type: string
        description: Description
        default: ""

      identification_scope:
        type: string
        description: Scope
        enum: [
          "Bible", "Bible with Deuterocanon", "Deuterocanon", "New Testament",
          "New Testament+", "Old Testament", "Old Testament + Deuterocanon",
          "Old Testament+", "Portions", "Selections", "Shorter Bible", ""]

      agencies_rightsHolders:
        type: array
        description: Rights Holders
        items:
          $ref: '#/definitions/OrgId'
        minItems: 1

      agencies_rightsAdmin:
        $ref: '#/definitions/OrgId'

      agencies_contributors:
        type: array
        description: List of agencies that contribut to the project
        items:
          $ref: '#/definitions/Contributor'
        default: []
        example:
          - id: 5494956f5117ad586f2e2f40
            content: true
            publication: false
            management: false
            qa: false
            finance: false

      language_iso:
        type: string
        description: ISO 639-3 language code
        pattern: /^[a-z][a-z][a-z]$/
        example: eng

      language_ldml:
        type: string
        description: BCP 47 language tag
        pattern: /^[a-z]{2,3}([-][A-Za-z0-9]+){0,3}$/
        example: en-GB

      language_rod:
        type: string
        description: |
          Dialect code.  This is a 5-digit code defined by the
          Registry of Dialects.
        pattern: /^[0-9]{5}$/
        example: "03222"

      countries:
        type: array
        description: |
          List of ISO 3166 alpha-2 country codes targeted by the project
        items:
          type: string
          description: ISO 3166 alpha-2 country code
          pattern: /^[A-Z][A-Z]$/
          example: "GB"
        minItems: 1

      identification_nameLocal:
        type: string
        description: Localised Full Name

      identification_abbreviation:
        type: string
        description: Abbreviation
        pattern: /^[A-Za-z0-9_]{2,16}$/

      identification_abbreviationLocal:
        type: string
        description: Localised Abbreviation
        pattern: /^.{0,16}$/

      language_scriptCode:
        type: string
        description: ISO 15924 script code
        pattern: /^[A-Z][a-z][a-z][a-z]$/
        example: Latn

      language_numerals:
        type: string
        description: Numerals
        enum: [
          "Arabic", "Bengali", "Burmese", "Devanagari", "Ethiopic", "Farsi",
          "Gujarati", "Gurmukhi", "Hebrew", "Hindi", "Kannada", "Khmer",
          "Malayalam", "Oriya", "Tamil", "Telugu", "Thai", "Tibetan", ""]

      copyright:
        type: string
        description: Copyright

      promotion_promoVersionInfo:
        type: string
        description: Promotion Text

      type_translationType:
        type: string
        description: Translation Type
        enum: ["First", "New", "Revision", "Study / Help Material", ""]

      type_audience:
        type: string
        description: Audience
        enum: ["Children", "Basic", "Common", "Common - Literary",
               "Literary", "Literary - Liturgical", "Liturgical", ""]

      type_media:
        type: array
        description: Media
        items:
          type: string
          description: Medium
          enum: ["Print", "Electronic", "Audio", "Video", ""]
        default: []
        example: ["Print", "Electronic"]

      comments:
        type: string
        description: Comments

      visibility:
        type: boolean
        description: Visibility
        enum: ["Public", "Test or Training", "Confidential"]
        default: "Public"

      # <END GBC FIELDS>

      revisionBase_name:
        type: string
        description: Full name of text this revision is based on

      revisionBase_rightsHolders:
        type: array
        description: Rightsholders of the base text for this revision
        items:
          $ref: '#/definitions/OrgId'

      # Are you expecting a financial return?
      expectingFinancialReturn:
        type: boolean
        description: Financial Return Expectation

      # Church or other faith community represented. UI needs to allow picking from a list or naming a new entry
      faithCommunities:
        type: array
        description: Faith Communities
        items:
          type: string
          description: Church or faith community
        default: []

      # In what respects is your translation unique? How does it relate to any existing translations?
      projectDescription:
        type: string

      # What needs is this translation intended to address?
      descriptionOfNeed:
        type: string
        description: Description of Need

  ProjectProgress:
    type: object
    required:
      - status
    properties:
      status:
        type: string
        enum: ["Projected", "Active", "Typesetting", "Completed", "Published", "Inactive", ""]
      dateStarted:
        type: string
        format: date-time
      dateCompleted:
        type: string
        format: date-time
      dateExpectedCompletion:
        type: string
        format: date-time
      dateComputerEstimatedCompletion:
        type: string
        format: date-time
      dateProgressUpdated:
        type: string
        format: date-time
        description: When the progress information was last updated.
      dateProgressApproved:
        type: string
        format: date-time
        description: When the progress information was last approved.
      percentage:
        type: number
        minimum: 0
        maximum: 100

  ProgressRecord:
    type: object
    required:
      - systemId
      - books
      - stages
      - history
    properties:
      systemId:
        $ref: '#/definitions/SystemId'
      approved:
        type: boolean
        description: True if the latest progress data has been approved.
      books:
        type: array
        description: Per-book progress information
        items:
          $ref: '#/definitions/BookProgress'
      history:
        type: array
        description: Progress history
        items:
          type: object
          required: ["name", "percentage"]
          properties:
            date:
              type: date
              example: "1996-12-01"
            percentage:
              type: number
              example: 5.32
            stages:
              type: array
              example: [100, 50, 0, 0]
              items:
                type: number
      stages:
        type: array
        description: Stage information
        items:
          type: object
          required: ["name", "percentage"]
          properties:
            name:
              type: string
              example: Stage 1
            percentage:
              type: number
              example: 6.67

  BookProgress:
    type: object
    required: ["id"]
    properties:
      id:
        type: string
        description: Book code
        example: GEN
      verses:
        type: integer
        description: Number of verses in this book
        example: 1533
      percentage:
        type: number
        description: Total percentage 0-100 of progress made in this book
      stages:
        type: array
        description: Per-stage completion percentage
        example: [100, 50, 0, 0]
        items:
          type: number
      stageDifficulties:
        type: array
        description: Difficulty of each stage
        example: [23.45, 12.01, 2.2, 2.3]
        items:
          type: number
      stagesStarted:
        type: array
        description: Start date (or null) per stage
        example: ["2018-01-01", "2018-12-01", "2018-12-01", "2018-12-01"]
        items:
          type: date
          nullable: true
      stagesCompleted:
        type: array
        description: Start date (or null) per stage
        example: ["2018-12-01", "2019-01-01", "2019-02-01", "2019-03-01"]
        items:
          type: date
          nullable: true

  ExtendedProjectProgress:
    allOf:
      - $ref: '#/definitions/ProjectProgress'
      - $ref: '#/definitions/ProgressRecord'

  ProgressUpdate:
    type: object
    required:
      - percentage
      - percentages
    properties:
      date:
        type: date
        description: Date at which the progress was updated
        example: "2019-04-05"
      percentage:
        type: number
        description: Calculated percentage for the progress
        example: 75.0
      percentages:
        type: object
        description: Per-book per-stage percentages
        example:
          GEN: [100, 100, 100, 100]
          EXO: [100, 50, 0, 0]
        additionalProperties:
          type: array
          example: [100, 50, 3.45, 0]
          items:
            type: number

  ProjectRegistration:
    type: object
    required:
      - type
      - licensedToParatextId
      - licensedToOrgs
      - issuedAt
      - revoked
      - signature
    properties:
      type:
        type: string
        description: License type granted to this project
        enum: ["translator", "publisher"]
      licensedToParatextId:
        type: string
        description: |
          Snapshot of Paratext project ID at time of license generation (?),
          so we know what went wrong if the license goes invalid
        example: dbb4aeddf353585b42792940575442a70c09885b
      licensedToOrgs:
        type: array
        description: Snapshot of agencies_rightsHolders (?)
        items:
          type: string
          description: Organisation identifier
          format: org-id
          pattern: /^[0-9a-f]{24}$/
          example: 5494956f5117ad586f2e2f40
      issuedAt:
        type: string
        format: date-time
        description: Date license requested.
      expiresAt:
        type: string
        format: date-time
        description: Date at which the license expires, or null if it doesn't
      revoked:
        type: boolean
        description: True if the license has been revoked (this is rare)
      signature:
        type: string
        description: |
          Base-64 cryptographic signature that can be used to verify the
          authenticity of this license

  ProjectMember:
    type: object
    required: ["role"]
    properties:
      userId:
        type: string
        description: May be absent in the case of a Paratext 7 user.
        example: DrPaKo7424xtzu3gu
      username:
        type: string
        description: |
          May be absent if the user has not yet obtained a registration code.
      role:
        type: string
        description: Role of the user in the project
        enum:
          - pt_administrator
          - pt_consultant
          - pt_translator
          - pt_observer
          - pt_read
          - pt_write_note

  OrgMetadata:
    type: object
    required:
      - id
      - name
      - parent
    properties:
      id:
        type: string
        description: |
          Unique organisation identifier consisting of 24 alphanumeric
          characters.
        pattern: /^[0-9a-f]{24}$/
        example: 5494956f5117ad586f2e2f40
      name:
        type: string
        description: English name of the organisation.
      nameLocal:
        type: string
        description: Name of the organisation in its native language.
      abbr:
        type: string
        description: An abbreviation under which the organisation is known.
      parent:
        type: string
        description: |
          Identifier of the parent organisation.  Top-level organisations
          should have a parent ID of 545d2cb003f5772898d5891d
        format: org-id
        pattern: /^[0-9a-f]{24}$/
        default: 545d2cb003f5772898d5891d
      in_dbl:
        type: boolean
        description: |
          If true, indicates that this entry is managed in DBL.  This means
          that the name, nameLocal, abbr, parent and url fields may not be
          changed in the Registry.  Temporary field.
      url:
        type: string
        description: URL of the organisation's web site
        example: 'https://example.com'
      country_iso:
        type: string
        description: |
          ISO 3166 alpha-2 country code indicating where the organisation is
          headquartered.
        format: countryCode
        pattern: /^[A-Z][A-Z]$/
        example: US
      location:
        type: string
        description: |
          Location, normally a city, where the organisation is headquartered.
      area:
        type: string
        description: Area in which the organisation is primarily active.
        enum: ["Americas", "Europe", "Africa", "Asia", "Asia/Pacific", "Pacific"]
      active:
        type: boolean
        description: Whether the organisation is currently active.
      public:
        type: boolean
        description: |
          Organisations not marked public are not visible to users who are not
          a member of the organisation or a parent organisation.
        default: false
        example: true
      domains:
        type: array
        description: |
          List of e-mail domains used by the organisation.  This should only
          include an e-mail domain if e-mail addresses under this domain are
          exclusively available to people who belong to this organisation.
        items:
          type: string
      authorizedForParatext:
        type: boolean
        description: Authorised for Paratext
        default: false
      shareBasicProgressInfo:
        type: boolean
        description: Share basic progress info

  UserInfo:
    type: object
    required: ['sub']
    properties:
      sub:
        type: string
        description: The unique 17-character user identifier.
      username:
        type: string
        description: The user's registration name, if their
          registration has been completed.
      primary_org_id:
        type: string
        description: |
          The unique 24-characterorganisation identifier of the user's
          primary organisation.
      pt_approved:
        type: boolean
        description: If true, the user is an approved translator in
          an organisation that is approved for Paratext.
      picture:
        type: string
        description: URL to profile picture.
  
  UserRole:
    type: object
    properties:
      orgId:
        type: string
        description: Unique organisation identifier consisting of 24 alphanumeric characters.
        format: org-id
        pattern: /^[0-9a-f]{24}$/
        example: 5494956f5117ad586f2e2f40
      type:
        type: string
        description: Role identifier
      orgPath:
        type: array
        description: |
          Ancestry of the organization.
        items:
          type: string
          description: | 
            The last 6 digits of an organization's 24-character
            alphanumeric identifier.
          pattern: /^[0-9a-f]{6}$/

  LiveSession:
    type: object
    required: ['uri', 'queue']
    properties:
      sub:
        type: string
        description: URI to an AMQP server.
        example: amqps://username:password@1.2.3.4:5671
      queue:
        type: string
        description: Name of the queue to connect to.
        example: Mtj91rM-X1RDoUEaggJQdAg5PhTM539-hdBcOBH0GgH
